name: Bug Report
description: Report a bug in the game
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: mode
    attributes:
      label: Game Mode
      options:
        - Coin Clash
        - Bot Clash
        - Landing Page (/clash)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to ...
        2. Select ...
        3. See error
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser & Device
      placeholder: e.g. Chrome 120 on macOS, Safari on iPhone 15
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: If applicable, add a screenshot
    validations:
      required: false
